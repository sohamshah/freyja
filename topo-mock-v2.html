<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Freyja — Topographic Backdrop v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #06070b;
    --text-dim: rgba(160, 178, 200, 0.32);
    --text-mid: rgba(170, 186, 208, 0.50);
    --text: rgba(195, 208, 224, 0.78);
  }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .panel-wrap {
    position: relative;
    width: 420px;
    height: 94vh;
  }

  .panel {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    overflow: hidden;
    isolation: isolate;
    background:
      linear-gradient(180deg, rgba(18, 20, 28, 0.28), rgba(8, 9, 14, 0.22)),
      rgba(7, 8, 12, 0.22);
    box-shadow:
      inset 0 0.5px 0 0 rgba(255, 255, 255, 0.09),
      inset 0 0 0 1px rgba(255, 255, 255, 0.05),
      0 12px 80px -12px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(0, 0, 0, 0.3);
  }

  .topo-layer {
    position: absolute;
    inset: 0;
    z-index: -10;
    overflow: hidden;
    border-radius: 18px;
  }
  .topo-layer svg {
    width: 100%;
    height: 100%;
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: -5;
    pointer-events: none;
    border-radius: 18px;
    background:
      radial-gradient(ellipse 70% 60% at 50% 42%, transparent 0%, transparent 50%, rgba(6,7,11,0.4) 85%, rgba(6,7,11,0.75) 100%),
      linear-gradient(to bottom, rgba(6,7,11,0.45) 0%, transparent 7%, transparent 93%, rgba(6,7,11,0.45) 100%);
  }

  .panel-content {
    position: relative;
    z-index: 1;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 100%;
    overflow-y: auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-transform: uppercase;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    color: var(--text-mid);
  }
  .section-header .value { font-weight: 400; letter-spacing: 1px; color: var(--text-dim); }
  .section-header .chevron { font-size: 14px; opacity: 0.3; }

  .stat-row {
    display: flex;
    gap: 1px;
    border-radius: 10px;
    overflow: hidden;
  }
  .stat-cell {
    flex: 1;
    padding: 12px 8px 10px;
    text-align: center;
    background: rgba(255, 255, 255, 0.018);
  }
  .stat-cell:first-child { border-radius: 10px 0 0 10px; }
  .stat-cell:last-child  { border-radius: 0 10px 10px 0; }
  .stat-label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .stat-value { font-size: 13px; font-weight: 500; color: var(--text); }

  .bar-track {
    height: 2px;
    background: rgba(255,255,255,0.03);
    border-radius: 1px;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(100,160,255,0.6), rgba(120,180,255,0.2));
    border-radius: 1px;
  }

  .spend-row {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    padding: 2px 0;
  }
  .spend-row .label { color: var(--text-dim); }
  .spend-row .val   { color: var(--text); font-weight: 500; }

  .divider { height: 1px; background: rgba(255,255,255,0.035); margin: 4px 0; }

  .empty-state {
    font-style: italic;
    font-size: 10.5px;
    color: var(--text-dim);
    padding: 4px 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    padding: 0 5px;
    border-radius: 8px;
    font-size: 8.5px;
    font-weight: 600;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    margin-left: 6px;
  }

  .expand-btn {
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 5px;
    background: rgba(255,255,255,0.025);
    border: none;
    font-family: inherit;
  }

  .diag-summary {
    font-size: 9.5px;
    color: var(--text-dim);
    padding: 7px 10px;
    background: rgba(255,255,255,0.012);
    border-radius: 7px;
  }
</style>
</head>
<body>

<div class="panel-wrap">
  <div class="panel" id="panel">
    <div class="topo-layer" id="topoLayer"></div>
    <div class="vignette"></div>

    <div class="panel-content">
      <div class="section-header"><span>Activity</span><span class="chevron">›</span></div>
      <div class="section-header"><span>Request Context</span><span class="value">0/1000k</span></div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="stat-row">
        <div class="stat-cell"><div class="stat-label">Request</div><div class="stat-value">0</div></div>
        <div class="stat-cell"><div class="stat-label">Output</div><div class="stat-value">0</div></div>
        <div class="stat-cell"><div class="stat-label">Cache</div><div class="stat-value">0</div></div>
      </div>
      <div class="stat-row">
        <div class="stat-cell" style="border-radius: 10px"><div class="stat-label">Billed Input</div><div class="stat-value">0</div></div>
      </div>
      <div class="spend-row"><span class="label">session spend</span><span class="val">$0.0000</span></div>
      <div class="stat-row">
        <div class="stat-cell"><div class="stat-label">Img Trims</div><div class="stat-value">0</div></div>
        <div class="stat-cell"><div class="stat-label">Summaries</div><div class="stat-value">0</div></div>

      <div class="empty-state">No tool calls yet</div>

      <div class="empty-state">No file changes yet</div>

      <div class="empty-state">No file changes yet</div>

      <div class="section-header">
        <span>▸ Diagnostics</span>
        <button class="expand-btn">Expand</button>
      </div>
      <div class="diag-summary">5 events · 13 logs</div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Freyja Topographic Backdrop v2.1
//
// Fixes over v2:
//  1. DEAD ZONE FIX — added base terrain + detail noise layers so the
//     height field has interesting gradients EVERYWHERE, not just near
//     Gaussian peaks. Base terrain is medium-freq FBM (~80px features),
//     detail is high-freq (~25px features). Together they guarantee
//     iso-levels cross every region of the panel.
//  2. PERTURBATION REWRITE — replaced smooth sum-of-sines with
//     hash-based value noise FBM. 3-layer system with ridged noise
//     in the coarse layer for sharp geological crinkles. Non-periodic,
//     irregular, and uses irrational lacunarity (2.2, 2.3) so octaves
//     never align into visible grid patterns.
// ═══════════════════════════════════════════════════════════════

const SEED = 13;

const CFG = {
  cellSize:          3,
  levels:            40,

  numPeaks:          20,
  peakSigmaMin:      0.13,
  peakSigmaMax:      0.32,
  peakHeightMin:     0.40,
  peakHeightMax:     1.0,
  peakSpacingMin:    0.12,
  depressionChance:  0.12,

  flowAmplitude:     0.80,   // stronger flow through saddles (was 0.65)
  flowFreq:          0.003,
  flowOctaves:       3,
  flowPersistence:   0.55,

  // Base terrain — medium-freq FBM that fills ALL flat zones
  // ~80px feature size, guarantees non-zero gradient everywhere
  baseAmplitude:     0.35,
  baseFreq:          0.012,
  baseOctaves:       4,
  basePersistence:   0.50,

  // Detail grain — high-freq FBM, prevents base terrain's own saddle dead spots
  // ~25px feature size
  detailAmplitude:   0.15,
  detailFreq:        0.04,
  detailOctaves:     3,
  detailPersistence: 0.45,

  warpStrength:      22,
  warpFreq:          0.005,
  warpOctaves:       2,

  // Uniform line style
  lineOpacity:       0.09,
  lineStroke:        0.75,
  tintOpacity:       0.008,

  minRawPoints:      6,
  smoothAbove:       10,

  // Colour ramp
  hueDeep:           228,
  hueHigh:           205,
  satDeep:           25,
  satHigh:           35,
  lightDeep:         55,
  lightHigh:         68,
};

// ── Seeded PRNG ────────────────────────────────────────────
function makeRng(seed) {
  let s = (seed | 0) || 1;
  return () => {
    s = (s * 1664525 + 1013904223) | 0;
    return ((s >>> 0) % 1000000) / 1000000;
  };
}

// ── Sum-of-sines noise (for field generation) ──────────────
function makePhases(r) {
  return {
    a: r() * Math.PI * 2, b: r() * Math.PI * 2,
    c: r() * Math.PI * 2, d: r() * Math.PI * 2,
    rot: r() * Math.PI * 2,
  };
}

function oneOctave(px, py, freq, ph) {
  const cosR = Math.cos(ph.rot), sinR = Math.sin(ph.rot);
  const rx = px * cosR - py * sinR, ry = px * sinR + py * cosR;
  return (
    Math.sin(rx * freq + ph.a) * Math.cos(ry * freq * 1.07 + ph.b) +
    0.55 * Math.sin((rx + ry) * freq * 0.7 + ph.c) +
    0.4 * Math.cos((rx - ry) * freq * 0.85 + ph.d)
  );
}

function fbm(px, py, phases, freq0, persistence) {
  let v = 0, amp = 1, freq = freq0;
  for (let o = 0; o < phases.length; o++) {
    v += amp * oneOctave(px, py, freq, phases[o]);
    amp *= persistence; freq *= 2.05;
  }
  return v;
}

// ── Hash-based value noise (for perturbation — non-periodic) ──
function hash2d(ix, iy, seed) {
  let n = (ix * 1619 + iy * 31337 + seed * 6971) | 0;
  n = (n << 13) ^ n;
  n = ((n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff);
  return n / 0x7fffffff;
}

function vnoise(x, y, seed) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  // Quintic interpolation (C2 continuous)
  const u = fx * fx * fx * (fx * (fx * 6 - 15) + 10);
  const v = fy * fy * fy * (fy * (fy * 6 - 15) + 10);
  const a = hash2d(ix,     iy,     seed);
  const b = hash2d(ix + 1, iy,     seed);
  const c = hash2d(ix,     iy + 1, seed);
  const d = hash2d(ix + 1, iy + 1, seed);
  return ((a * (1 - u) + b * u) * (1 - v) +
          (c * (1 - u) + d * u) * v) * 2 - 1;
}

// FBM with optional ridged mode (abs creates sharp geological creases)
function fbmHash(x, y, seed, octaves, lacunarity, gain, ridged) {
  let sum = 0, amp = 1, freq = 1, maxAmp = 0;
  for (let o = 0; o < octaves; o++) {
    let n = vnoise(x * freq, y * freq, seed + o * 5381);
    if (ridged) n = 1 - 2 * Math.abs(n);
    sum += n * amp;
    maxAmp += amp;
    amp *= gain;
    freq *= lacunarity;
  }
  return sum / maxAmp;
}

// ── Field generation ──────────────────────────────────────
function makeField(W, H, seed) {
  const r = makeRng(seed);
  const minDim = Math.min(W, H);

  // Poisson-style peak placement — allow peaks slightly outside for edge coverage
  const peaks = [];
  const spacing = minDim * CFG.peakSpacingMin;
  for (let i = 0; i < CFG.numPeaks; i++) {
    let cx = 0, cy = 0, best = -1;
    for (let tries = 0; tries < 40; tries++) {
      const m = -minDim * 0.08;
      const tx = m + r() * (W - 2 * m);
      const ty = m + r() * (H - 2 * m);
      let nearest = Infinity;
      for (const p of peaks) {
        const d = Math.hypot(tx - p.cx, ty - p.cy);
        if (d < nearest) nearest = d;
      }
      if (nearest > best) { best = nearest; cx = tx; cy = ty; }
      if (nearest >= spacing) break;
    }
    const sigma = minDim * (CFG.peakSigmaMin + r() * (CFG.peakSigmaMax - CFG.peakSigmaMin));
    const mag = CFG.peakHeightMin + r() * (CFG.peakHeightMax - CFG.peakHeightMin);
    const sign = r() < CFG.depressionChance ? -1 : 1;
    peaks.push({ cx, cy, sigma, h: mag * sign });
  }

  // Phase arrays for FBM layers
  const flowPhases    = Array.from({ length: CFG.flowOctaves }, () => makePhases(r));
  const warpPhasesX   = Array.from({ length: CFG.warpOctaves }, () => makePhases(r));
  const warpPhasesY   = Array.from({ length: CFG.warpOctaves }, () => makePhases(r));
  const basePhases    = Array.from({ length: CFG.baseOctaves }, () => makePhases(r));
  const detailPhases  = Array.from({ length: CFG.detailOctaves }, () => makePhases(r));

  const cell = CFG.cellSize;
  const cols = Math.ceil(W / cell) + 1;
  const rows = Math.ceil(H / cell) + 1;
  const data = new Float32Array(cols * rows);
  let min = Infinity, max = -Infinity;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const px = x * cell, py = y * cell;

      // Domain warp
      const wx = fbm(px, py, warpPhasesX, CFG.warpFreq, 0.5) * CFG.warpStrength;
      const wy = fbm(px, py, warpPhasesY, CFG.warpFreq, 0.5) * CFG.warpStrength;
      const sx = px + wx, sy = py + wy;

      // Gaussian peaks
      let v = 0;
      for (const p of peaks) {
        const dx = sx - p.cx, dy = sy - p.cy;
        v += p.h * Math.exp(-(dx * dx + dy * dy) / (p.sigma * p.sigma));
      }

      // Flow field — connects peaks through saddles
      v += CFG.flowAmplitude * fbm(sx, sy, flowPhases, CFG.flowFreq, CFG.flowPersistence);

      // Base terrain — fills flat zones with rolling hills (~80px features)
      v += CFG.baseAmplitude * fbm(sx, sy, basePhases, CFG.baseFreq, CFG.basePersistence);

      // Detail grain — prevents base terrain's own saddle dead spots (~25px features)
      // sx*1.3 offset breaks alignment with base layer
      v += CFG.detailAmplitude * fbm(sx * 1.3, sy * 1.3, detailPhases, CFG.detailFreq, CFG.detailPersistence);

      data[y * cols + x] = v;
      if (v < min) min = v;
      if (v > max) max = v;
    }
  }
  return { data, cols, rows, cell, min, max };
}

// ── Marching squares ──────────────────────────────────────
function march(field, level) {
  const { data, cols, rows, cell } = field;
  const segs = [];
  const lerp = (a, b) => {
    const d = b - a;
    if (Math.abs(d) < 1e-6) return 0.5;
    return Math.max(0, Math.min(1, (level - a) / d));
  };

  for (let y = 0; y < rows - 1; y++) {
    for (let x = 0; x < cols - 1; x++) {
      const tl = data[y * cols + x];
      const tr = data[y * cols + x + 1];
      const br = data[(y + 1) * cols + x + 1];
      const bl = data[(y + 1) * cols + x];
      let c = 0;
      if (tl > level) c |= 1;
      if (tr > level) c |= 2;
      if (br > level) c |= 4;
      if (bl > level) c |= 8;
      if (c === 0 || c === 15) continue;

      const tX = (x + lerp(tl, tr)) * cell, tY = y * cell;
      const rX = (x + 1) * cell,             rY = (y + lerp(tr, br)) * cell;
      const bX = (x + lerp(bl, br)) * cell,  bY = (y + 1) * cell;
      const lX = x * cell,                   lY = (y + lerp(tl, bl)) * cell;

      switch (c) {
        case 1: segs.push([lX,lY,tX,tY]); break;
        case 2: segs.push([tX,tY,rX,rY]); break;
        case 3: segs.push([lX,lY,rX,rY]); break;
        case 4: segs.push([rX,rY,bX,bY]); break;
        case 5: {
          const den = tl+br-tr-bl;
          const s = Math.abs(den)<1e-9 ? (tl+tr+br+bl)*0.25 : (tl*br-tr*bl)/den;
          if (level<s) { segs.push([lX,lY,tX,tY]); segs.push([rX,rY,bX,bY]); }
          else { segs.push([lX,lY,bX,bY]); segs.push([tX,tY,rX,rY]); }
          break;
        }
        case 6: segs.push([tX,tY,bX,bY]); break;
        case 7: segs.push([lX,lY,bX,bY]); break;
        case 8: segs.push([lX,lY,bX,bY]); break;
        case 9: segs.push([tX,tY,bX,bY]); break;
        case 10: {
          const den = tl+br-tr-bl;
          const s = Math.abs(den)<1e-9 ? (tl+tr+br+bl)*0.25 : (tl*br-tr*bl)/den;
          if (level<s) { segs.push([tX,tY,rX,rY]); segs.push([lX,lY,bX,bY]); }
          else { segs.push([lX,lY,tX,tY]); segs.push([rX,rY,bX,bY]); }
          break;
        }
        case 11: segs.push([tX,tY,rX,rY]); break;
        case 12: segs.push([lX,lY,rX,rY]); break;
        case 13: segs.push([tX,tY,rX,rY]); break;
        case 14: segs.push([lX,lY,tX,tY]); break;
      }
    }
  }
  return segs;
}

// ── Stitch ────────────────────────────────────────────────
function stitch(segments) {
  if (!segments.length) return [];
  const PREC = 1000;
  const key = (x, y) => `${Math.round(x * PREC)},${Math.round(y * PREC)}`;
  const map = new Map();
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    const k1 = key(s[0], s[1]), k2 = key(s[2], s[3]);
    if (!map.has(k1)) map.set(k1, []);
    if (!map.has(k2)) map.set(k2, []);
    map.get(k1).push([i, 0]);
    map.get(k2).push([i, 1]);
  }
  const visited = new Uint8Array(segments.length);
  const polys = [];
  for (let start = 0; start < segments.length; start++) {
    if (visited[start]) continue;
    visited[start] = 1;
    const s = segments[start];
    const pts = [s[0], s[1], s[2], s[3]];
    const extend = (forward) => {
      let cur = forward ? key(s[2], s[3]) : key(s[0], s[1]);
      while (true) {
        const cands = map.get(cur) || [];
        let next = -1, ei = 0;
        for (const [idx, end] of cands) {
          if (!visited[idx]) { next = idx; ei = end; break; }
        }
        if (next < 0) break;
        visited[next] = 1;
        const seg = segments[next];
        const nx = ei === 0 ? seg[2] : seg[0];
        const ny = ei === 0 ? seg[3] : seg[1];
        if (forward) pts.push(nx, ny);
        else pts.unshift(nx, ny);
        cur = key(nx, ny);
      }
    };
    extend(true);
    extend(false);
    polys.push(new Float32Array(pts));
  }
  return polys;
}

// ── Chaikin ───────────────────────────────────────────────
function chaikin(poly, iters) {
  let cur = poly;
  for (let it = 0; it < iters; it++) {
    const n = cur.length / 2;
    if (n < 3) return cur;
    const out = new Float32Array((n - 1) * 4 + 4);
    let i = 0;
    out[i++] = cur[0]; out[i++] = cur[1];
    for (let k = 0; k < n - 1; k++) {
      const x1 = cur[k*2], y1 = cur[k*2+1], x2 = cur[(k+1)*2], y2 = cur[(k+1)*2+1];
      out[i++] = 0.75*x1 + 0.25*x2; out[i++] = 0.75*y1 + 0.25*y2;
      out[i++] = 0.25*x1 + 0.75*x2; out[i++] = 0.25*y1 + 0.75*y2;
    }
    out[i++] = cur[(n-1)*2]; out[i++] = cur[(n-1)*2+1];
    cur = out.subarray(0, i);
  }
  return cur;
}

// ── Perturbation — hash-based, non-periodic, with ridged creases ──
function perturbPoly(poly, phase) {
  const out = new Float32Array(poly.length);
  const seedI = Math.round(phase * 1000);

  for (let i = 0; i < poly.length; i += 2) {
    const x = poly[i], y = poly[i + 1];

    // Scale to noise-space (controls feature size in px)
    const sx = x * 0.018, sy = y * 0.018;

    // Layer 1: Broad geological warping — RIDGED for sharp crease/ridge feel
    // Irrational lacunarity (2.2) breaks octave alignment → less regular
    const wx = fbmHash(sx * 0.35, sy * 0.35, seedI,       3, 2.2, 0.55, true);
    const wy = fbmHash(sx * 0.35, sy * 0.35, seedI+3001,  3, 2.2, 0.55, true);

    // Layer 2: Medium irregular bumps — standard FBM, non-periodic
    const mx = fbmHash(sx * 0.8,  sy * 0.8,  seedI+7001,  4, 2.3, 0.45, false);
    const my = fbmHash(sx * 0.8,  sy * 0.8,  seedI+11003, 4, 2.3, 0.45, false);

    // Layer 3: Fine grit — high-frequency micro-irregularity
    const gx = fbmHash(sx * 2.2,  sy * 2.2,  seedI+17001, 3, 2.0, 0.5, false);
    const gy = fbmHash(sx * 2.2,  sy * 2.2,  seedI+23003, 3, 2.0, 0.5, false);

    out[i]     = x + wx * 3.8 + mx * 2.2 + gx * 0.9;
    out[i + 1] = y + wy * 3.8 + my * 2.2 + gy * 0.9;
  }
  return out;
}

// ── Helpers ───────────────────────────────────────────────
function polyToD(poly) {
  if (poly.length < 4) return '';
  let d = `M${poly[0].toFixed(1)} ${poly[1].toFixed(1)}`;
  for (let i = 2; i < poly.length; i += 2)
    d += `L${poly[i].toFixed(1)} ${poly[i+1].toFixed(1)}`;
  return d;
}

function isClosed(poly) {
  const n = poly.length;
  if (n < 8) return false;
  const dx = poly[0] - poly[n-2], dy = poly[1] - poly[n-1];
  return dx*dx + dy*dy < 36;
}

function elevColor(t, opacity) {
  const h = CFG.hueDeep + (CFG.hueHigh - CFG.hueDeep) * t;
  const s = CFG.satDeep + (CFG.satHigh - CFG.satDeep) * t;
  const l = CFG.lightDeep + (CFG.lightHigh - CFG.lightDeep) * t;
  return `hsla(${h|0}, ${s|0}%, ${l|0}%, ${opacity})`;
}

// ═══════════════════════════════════════════════════════════
// BUILD
// ═══════════════════════════════════════════════════════════
function build() {
  const container = document.getElementById('topoLayer');
  const rect = container.getBoundingClientRect();
  const W = Math.round(rect.width);
  const H = Math.round(rect.height);
  if (W < 2 || H < 2) return;

  const field = makeField(W, H, SEED);
  const range = field.max - field.min;
  const lo = field.min + range * 0.04;
  const hi = field.max - range * 0.04;
  const pPhase = (SEED | 0) * 0.137;

  const contours = [];

  for (let i = 0; i < CFG.levels; i++) {
    const t = i / Math.max(1, CFG.levels - 1);
    const level = lo + (hi - lo) * t;
    const segs = march(field, level);
    const polys = stitch(segs);
    for (let poly of polys) {
      if (poly.length < CFG.minRawPoints * 2) continue;
      const smoothed = poly.length >= CFG.smoothAbove * 2 ? chaikin(poly, 2) : poly;
      const roughened = perturbPoly(smoothed, pPhase);
      const d = polyToD(roughened);
      if (!d) continue;
      contours.push({ d, elevation: t, closed: isClosed(roughened) });
    }
  }

  // Build SVG
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke-linejoin', 'round');
  svg.setAttribute('stroke-linecap', 'round');
  svg.style.mixBlendMode = 'screen';

  // Layer 1: Hypsometric tint fills
  const tintGroup = document.createElementNS(ns, 'g');
  for (const c of contours) {
    if (!c.closed) continue;
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', c.d + 'Z');
    path.setAttribute('fill', elevColor(c.elevation, CFG.tintOpacity));
    path.setAttribute('stroke', 'none');
    tintGroup.appendChild(path);
  }
  svg.appendChild(tintGroup);

  // Layer 2: Contour lines — uniform weight
  const lineGroup = document.createElementNS(ns, 'g');
  for (const c of contours) {
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', c.d);
    path.setAttribute('stroke', elevColor(c.elevation, CFG.lineOpacity));
    path.setAttribute('stroke-width', CFG.lineStroke.toString());
    path.setAttribute('fill', 'none');
    lineGroup.appendChild(path);
  }
  svg.appendChild(lineGroup);

  container.innerHTML = '';
  container.appendChild(svg);
  console.log(`Topo v2.1: ${W}×${H}, ${contours.length} paths`);
}

build();
window.addEventListener('resize', () => {
  clearTimeout(window._rt);
  window._rt = setTimeout(build, 200);
});
</script>
